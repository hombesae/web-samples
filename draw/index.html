<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>お絵かきボード</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #1a1a2e;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 28px 16px;
      color: #fff;
    }

    .back-link {
      align-self: flex-start;
      margin-bottom: 20px;
      text-decoration: none;
      color: #a0aec0;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: color 0.2s;
      max-width: 760px;
      width: 100%;
      margin-left: auto;
      margin-right: auto;
    }
    .back-link:hover { color: #fff; }

    h1 { font-size: 1.6rem; font-weight: 700; margin-bottom: 4px; text-align: center; }
    .subtitle { color: #718096; font-size: 0.88rem; margin-bottom: 20px; text-align: center; }

    /* ツールバー */
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      justify-content: center;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 16px;
      padding: 14px 18px;
      margin-bottom: 16px;
      width: 100%;
      max-width: 760px;
    }

    /* ツールグループ */
    .tool-group {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .tool-group label {
      font-size: 0.78rem;
      color: #718096;
      white-space: nowrap;
    }

    /* ツールボタン */
    .tool-btn {
      padding: 7px 14px;
      background: rgba(255,255,255,0.07);
      border: 2px solid transparent;
      border-radius: 10px;
      color: #e2e8f0;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .tool-btn:hover { background: rgba(255,255,255,0.14); }
    .tool-btn.active { border-color: #76e4f7; color: #76e4f7; background: rgba(118,228,247,0.12); }

    /* カラーパレット */
    .color-palette {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .color-swatch {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      cursor: pointer;
      border: 3px solid transparent;
      transition: transform 0.15s, border-color 0.15s;
      flex-shrink: 0;
    }

    .color-swatch:hover { transform: scale(1.2); }
    .color-swatch.active { border-color: #fff; transform: scale(1.15); }

    /* カスタムカラー入力 */
    input[type="color"] {
      width: 32px;
      height: 32px;
      border: none;
      border-radius: 50%;
      cursor: pointer;
      background: none;
      padding: 0;
    }

    /* ブラシサイズ */
    input[type="range"] {
      width: 90px;
      accent-color: #76e4f7;
      cursor: pointer;
    }

    /* 区切り */
    .divider {
      width: 1px;
      height: 28px;
      background: rgba(255,255,255,0.12);
    }

    /* キャンバスラッパー */
    .canvas-wrapper {
      position: relative;
      width: 100%;
      max-width: 760px;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 8px 40px rgba(0,0,0,0.4);
      border: 1px solid rgba(255,255,255,0.1);
      cursor: crosshair;
      background: #fff;
    }

    #draw-canvas {
      display: block;
      width: 100%;
      touch-action: none; /* タッチデバイスでスクロールを防ぐ */
    }

    /* サイズプレビュー */
    #size-preview {
      display: inline-block;
      width: 20px;
      height: 20px;
      background: #fff;
      border-radius: 50%;
      vertical-align: middle;
      transition: width 0.1s, height 0.1s;
    }

    /* アクションボタン */
    .action-btn {
      padding: 7px 14px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 10px;
      color: #e2e8f0;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .action-btn:hover { background: rgba(255,255,255,0.15); }
    .action-btn.danger:hover { background: rgba(233,69,96,0.2); border-color: #e94560; color: #fc8181; }

    /* 学習ポイント */
    .learn-box {
      margin-top: 20px;
      width: 100%;
      max-width: 760px;
      background: rgba(118, 228, 247, 0.07);
      border-left: 4px solid #76e4f7;
      border-radius: 0 14px 14px 0;
      padding: 14px 16px;
      font-size: 0.85rem;
      color: #90cdf4;
      line-height: 1.7;
    }
    .learn-box strong { display: block; margin-bottom: 6px; color: #76e4f7; }
  </style>
</head>
<body>

  <a class="back-link" href="../index.html">← サンプル一覧に戻る</a>

  <h1>🎨 お絵かきボード</h1>
  <p class="subtitle">マウスやタッチで自由に描いてみよう</p>

  <!-- ツールバー -->
  <div class="toolbar">

    <!-- ツール選択 -->
    <div class="tool-group">
      <label>ツール</label>
      <button class="tool-btn active" data-tool="pen">✏️ ペン</button>
      <button class="tool-btn" data-tool="eraser">🧹 消しゴム</button>
      <button class="tool-btn" data-tool="fill">🪣 塗りつぶし</button>
    </div>

    <div class="divider"></div>

    <!-- カラーパレット -->
    <div class="tool-group">
      <label>色</label>
      <div class="color-palette" id="color-palette">
        <div class="color-swatch active" data-color="#000000" style="background:#000000"></div>
        <div class="color-swatch" data-color="#e94560" style="background:#e94560"></div>
        <div class="color-swatch" data-color="#f6ad55" style="background:#f6ad55"></div>
        <div class="color-swatch" data-color="#68d391" style="background:#68d391"></div>
        <div class="color-swatch" data-color="#63b3ed" style="background:#63b3ed"></div>
        <div class="color-swatch" data-color="#b794f4" style="background:#b794f4"></div>
        <div class="color-swatch" data-color="#ffffff" style="background:#ffffff; box-shadow: inset 0 0 0 1px #ccc"></div>
      </div>
      <input type="color" id="custom-color" value="#000000" title="カスタムカラー">
    </div>

    <div class="divider"></div>

    <!-- ブラシサイズ -->
    <div class="tool-group">
      <label>サイズ</label>
      <input type="range" id="brush-size" min="1" max="50" value="6">
      <div id="size-preview"></div>
    </div>

    <div class="divider"></div>

    <!-- アクション -->
    <div class="tool-group">
      <button class="action-btn" id="undo-btn" title="元に戻す（Ctrl+Z）">↩ 元に戻す</button>
      <button class="action-btn" id="download-btn">💾 保存</button>
      <button class="action-btn danger" id="clear-btn">🗑️ クリア</button>
    </div>
  </div>

  <!-- キャンバス -->
  <div class="canvas-wrapper">
    <canvas id="draw-canvas"></canvas>
  </div>

  <!-- 学習ポイント -->
  <div class="learn-box">
    <strong>📚 このアプリで学べること</strong>
    ・<code>&lt;canvas&gt;</code> 要素とその 2D コンテキスト（<code>getContext('2d')</code>）<br>
    ・<code>mousedown / mousemove / mouseup</code> イベントで描画処理<br>
    ・<code>pointerevent</code> でマウスとタッチを統一処理<br>
    ・<code>getImageData / putImageData</code> を使ったUndo（元に戻す）機能
  </div>

  <script>
    // ============================================================
    //  【学習ポイント①】Canvas の初期化
    //  canvas要素を取得し、2D描画コンテキストを取得する
    // ============================================================
    const canvas  = document.getElementById('draw-canvas');
    const ctx     = canvas.getContext('2d'); // 2D描画APIを取得

    // キャンバスのサイズを設定（DPIに合わせて高解像度対応）
    function resizeCanvas() {
      const wrapper = canvas.parentElement;
      const w = wrapper.clientWidth;
      const h = Math.round(w * 0.6); // アスペクト比 5:3

      // devicePixelRatio: Retinaディスプレイで2倍の解像度
      const dpr = window.devicePixelRatio || 1;

      // 現在の描画内容を保存
      const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);

      canvas.width  = w * dpr;
      canvas.height = h * dpr;
      canvas.style.width  = w + 'px';
      canvas.style.height = h + 'px';
      ctx.scale(dpr, dpr);

      // 白背景で塗りつぶし
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, w, h);

      // 保存していた描画を復元（リサイズ前の内容を維持）
      ctx.putImageData(imageData, 0, 0);
    }

    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    // ============================================================
    //  【学習ポイント②】描画設定の状態管理
    // ============================================================
    let currentTool  = 'pen';
    let currentColor = '#000000';
    let brushSize    = 6;
    let isDrawing    = false;  // マウスが押されているか
    let lastX = 0, lastY = 0;  // 前回の座標
    let history = [];           // Undo用の履歴

    // ============================================================
    //  【学習ポイント③】座標の正規化
    //  canvas要素とマウス座標のズレを補正する
    // ============================================================
    function getPos(e) {
      const rect = canvas.getBoundingClientRect();
      // タッチイベントとマウスイベントを統一
      const clientX = e.touches ? e.touches[0].clientX : e.clientX;
      const clientY = e.touches ? e.touches[0].clientY : e.clientY;
      return {
        x: (clientX - rect.left),
        y: (clientY - rect.top)
      };
    }

    // ============================================================
    //  【学習ポイント④】描画処理
    //  ctx.beginPath() → ctx.moveTo() → ctx.lineTo() → ctx.stroke()
    //  で線を描く
    // ============================================================
    function startDraw(e) {
      e.preventDefault();
      isDrawing = true;

      // 現在の状態をUndo履歴に保存
      saveHistory();

      const pos = getPos(e);
      lastX = pos.x;
      lastY = pos.y;

      if (currentTool === 'fill') {
        floodFill(Math.round(pos.x), Math.round(pos.y), currentColor);
        isDrawing = false;
        return;
      }

      // 点を打つ（クリックだけで離した場合も表示される）
      ctx.beginPath();
      ctx.arc(pos.x, pos.y, getBrushRadius(), 0, Math.PI * 2);
      ctx.fillStyle = currentTool === 'eraser' ? '#ffffff' : currentColor;
      ctx.fill();
    }

    function draw(e) {
      if (!isDrawing) return;
      e.preventDefault();

      const pos = getPos(e);

      ctx.beginPath();
      ctx.moveTo(lastX, lastY);    // 前回の位置から
      ctx.lineTo(pos.x, pos.y);   // 今の位置まで線を引く

      if (currentTool === 'eraser') {
        ctx.strokeStyle = '#ffffff';
        ctx.lineWidth = brushSize * 2.5;
      } else {
        ctx.strokeStyle = currentColor;
        ctx.lineWidth = brushSize;
      }

      ctx.lineCap   = 'round'; // 線の端を丸く
      ctx.lineJoin  = 'round'; // 折れ曲がりを丸く
      ctx.stroke();

      lastX = pos.x;
      lastY = pos.y;
    }

    function endDraw() {
      isDrawing = false;
    }

    function getBrushRadius() {
      return currentTool === 'eraser' ? brushSize * 1.25 : brushSize / 2;
    }

    // ============================================================
    //  【学習ポイント⑤】PointerEvent でマウス・タッチを統一
    // ============================================================
    canvas.addEventListener('pointerdown', startDraw);
    canvas.addEventListener('pointermove', draw);
    canvas.addEventListener('pointerup', endDraw);
    canvas.addEventListener('pointerleave', endDraw);

    // ============================================================
    //  【学習ポイント⑥】Undo機能（元に戻す）
    //  getImageData でピクセルデータを保存、putImageData で復元
    // ============================================================
    function saveHistory() {
      const w = canvas.width / (window.devicePixelRatio || 1);
      const h = canvas.height / (window.devicePixelRatio || 1);
      history.push(ctx.getImageData(0, 0, canvas.width, canvas.height));
      if (history.length > 30) history.shift(); // 最大30ステップ
    }

    function undo() {
      if (history.length === 0) return;
      ctx.putImageData(history.pop(), 0, 0);
    }

    document.getElementById('undo-btn').addEventListener('click', undo);

    // Ctrl+Z でもUndoできる
    document.addEventListener('keydown', (e) => {
      if ((e.ctrlKey || e.metaKey) && e.key === 'z') undo();
    });

    // ============================================================
    //  【学習ポイント⑦】塗りつぶし（フラッドフィル）
    //  再帰的な探索アルゴリズム（スタックを使って実装）
    // ============================================================
    function hexToRgb(hex) {
      const r = parseInt(hex.slice(1, 3), 16);
      const g = parseInt(hex.slice(3, 5), 16);
      const b = parseInt(hex.slice(5, 7), 16);
      return [r, g, b, 255];
    }

    function colorsMatch(a, b) {
      return a[0] === b[0] && a[1] === b[1] && a[2] === b[2] && a[3] === b[3];
    }

    function floodFill(startX, startY, fillColor) {
      const dpr = window.devicePixelRatio || 1;
      const w = canvas.width;
      const h = canvas.height;
      const imageData = ctx.getImageData(0, 0, w, h);
      const data = imageData.data;

      const px = (x, y) => (y * w + x) * 4; // ピクセルインデックス計算
      const targetColor = [data[px(startX * dpr, startY * dpr)], data[px(startX * dpr, startY * dpr) + 1],
                           data[px(startX * dpr, startY * dpr) + 2], data[px(startX * dpr, startY * dpr) + 3]];
      const fill = hexToRgb(fillColor);

      if (colorsMatch(targetColor, fill)) return;

      // スタック（LIFO）を使って再帰の代わりに処理
      const stack = [[Math.round(startX * dpr), Math.round(startY * dpr)]];

      while (stack.length) {
        const [cx, cy] = stack.pop();
        if (cx < 0 || cy < 0 || cx >= w || cy >= h) continue;

        const idx = px(cx, cy);
        const current = [data[idx], data[idx+1], data[idx+2], data[idx+3]];
        if (!colorsMatch(current, targetColor)) continue;

        data[idx]   = fill[0];
        data[idx+1] = fill[1];
        data[idx+2] = fill[2];
        data[idx+3] = fill[3];

        stack.push([cx+1, cy], [cx-1, cy], [cx, cy+1], [cx, cy-1]);
      }

      ctx.putImageData(imageData, 0, 0);
    }

    // ============================================================
    //  ツールバーの各コントロール
    // ============================================================

    // ツール切り替え
    document.querySelectorAll('.tool-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentTool = btn.dataset.tool;
        canvas.style.cursor = currentTool === 'fill' ? 'cell' : 'crosshair';
      });
    });

    // カラースウォッチ
    document.querySelectorAll('.color-swatch').forEach(swatch => {
      swatch.addEventListener('click', () => {
        document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
        swatch.classList.add('active');
        currentColor = swatch.dataset.color;
        document.getElementById('custom-color').value = currentColor;
        if (currentTool === 'eraser') {
          currentTool = 'pen';
          document.querySelectorAll('.tool-btn').forEach(b => {
            b.classList.toggle('active', b.dataset.tool === 'pen');
          });
        }
      });
    });

    // カスタムカラー
    document.getElementById('custom-color').addEventListener('input', (e) => {
      currentColor = e.target.value;
      document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
    });

    // ブラシサイズ
    const brushSizeInput = document.getElementById('brush-size');
    const sizePreview    = document.getElementById('size-preview');

    brushSizeInput.addEventListener('input', () => {
      brushSize = parseInt(brushSizeInput.value);
      sizePreview.style.width  = brushSize + 'px';
      sizePreview.style.height = brushSize + 'px';
    });

    // クリア
    document.getElementById('clear-btn').addEventListener('click', () => {
      if (confirm('キャンバスをクリアしますか？')) {
        saveHistory();
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
      }
    });

    // 画像保存
    document.getElementById('download-btn').addEventListener('click', () => {
      const link = document.createElement('a');
      link.download = `drawing_${Date.now()}.png`;
      link.href = canvas.toDataURL('image/png');
      link.click();
    });
  </script>
</body>
</html>
